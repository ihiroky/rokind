    - data:
        code: "import re\nimport unicodedata\n\ndef main(ocr_amount: str, user_amount:\
          \ str) -> dict:\n    def to_integer(value: str):\n        if not value or\
          \ not str(value).strip():\n            return None\n        value = unicodedata.normalize(\"\
          NFKC\", str(value))\n        digits_only = re.sub(r\"[^\\d]\", \"\", value)\n\
          \        if not digits_only:\n            return None\n        return int(digits_only)\n\
          \n    if not ocr_amount or not str(ocr_amount).strip():\n        return\
          \ {\"result\": \"アラート\"}\n    if not user_amount or not str(user_amount).strip():\n\
          \        return {\"result\": \"アラート\"}\n\n    ocr_val = to_integer(ocr_amount)\n\
          \    user_val = to_integer(user_amount)\n\n    if ocr_val is None or user_val\
          \ is None:\n        return {\"result\": \"アラート\"}\n    if ocr_val == user_val:\n\
          \        return {\"result\": \"○\"}\n    return {\"result\": \"アラート\"}"
        code_language: python3
