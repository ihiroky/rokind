    - data:
        code: "import re\nimport unicodedata\n\ndef main(ocr_date: str, user_date:\
          \ str) -> dict:\n    ERA_OFFSET = {\n        \"令和\": 2018, \"R\": 2018,\n\
          \        \"平成\": 1988, \"H\": 1988,\n        \"昭和\": 1925, \"S\": 1925,\n\
          \        \"大正\": 1911, \"T\": 1911,\n    }\n\n    def parse_date(value:\
          \ str):\n        if not value or not str(value).strip():\n            return\
          \ None\n        value = unicodedata.normalize(\"NFKC\", str(value)).strip()\n\
          \        era_pattern = re.compile(\n            r\"(令和|平成|昭和|大正|[RrHhSsTt])\\\
          s*(元|\\d{1,2})\\s*[年./]?\\s*(\\d{1,2})\\s*[月./\\-]?\\s*(\\d{1,2})\\s*日?\"\
          ,    \n            re.IGNORECASE,\n        )\n        m = era_pattern.search(value)\n\
          \        if m:\n            era_str, year_str, month_str, day_str = m.groups()\n\
          \            era_key = era_str.upper() if len(era_str) == 1 else era_str\n\
          \            offset = ERA_OFFSET.get(era_key)\n            if offset is\
          \ None:\n                return None\n            year_num = 1 if year_str\
          \ == \"元\" else int(year_str)\n            year = offset + year_num\n  \
          \          return (year, int(month_str), int(day_str))\n\n        western_pattern\
          \ = re.compile(\n            r\"(\\d{2,4})\\s*[/\\-\\.年]\\s*(\\d{1,2})\\\
          s*[/\\-\\.月]\\s*(\\d{1,2})\\s*日?\"\n        )\n        m = western_pattern.search(value)\n\
          \        if m:\n            year_str, month_str, day_str = m.groups()\n\
          \            year = int(year_str)\n            if year < 100:\n        \
          \        year += 2000\n            return (year, int(month_str), int(day_str))\n\
          \        return None\n\n    if not ocr_date or not str(ocr_date).strip():\n\
          \        return {\"result\": \"注意\"}\n    if not user_date or not str(user_date).strip():\n\
          \        return {\"result\": \"注意\"}\n\n    ocr_parsed = parse_date(ocr_date)\n\
          \    user_parsed = parse_date(user_date)\n\n    if ocr_parsed is None or\
          \ user_parsed is None:\n        return {\"result\": \"注意\"}\n    if ocr_parsed\
          \ == user_parsed:\n        return {\"result\": \"○\"}\n    return {\"result\"\
          : \"注意\"}"
        code_language: python3
