    - data:
        code: "import json\nimport re\nimport unicodedata\n\ndef main(content: str,\
          \ user_amount: str, user_date: str, user_vendor: str, user_invoice_flag:\
          \ str) -> dict:\n    def sanitize(value) -> str:\n        if value is None:\n\
          \            return \"\"\n        if not isinstance(value, str):\n     \
          \       value = str(value)\n        value = unicodedata.normalize(\"NFKC\"\
          , value)\n        value = re.sub(r\"[\\t\\r\\n\\x00-\\x1f\\x7f]\", \" \"\
          , value)\n        value = re.sub(r\" {2,}\", \" \", value)\n        return\
          \ value.strip()\n\n    try:\n        ocr_data = json.loads(content)\n  \
          \  except json.JSONDecodeError:\n        ocr_data = {}\n\n    # ★修正: fieldsから英語キーで取得\n\
          \    fields = ocr_data.get(\"fields\", {})\n\n    total = fields.get(\"\
          total\", {})\n    raw_ocr_amount     = str(total.get(\"amount\", \"\"))\
          \ if total else \"\"\n    raw_ocr_date       = fields.get(\"transactionDate\"\
          , \"\")\n    raw_ocr_vendor     = fields.get(\"merchantName\", \"\")\n \
          \   raw_ocr_invoice_no = fields.get(\"merchantNumber\", \"\")\n\n    ocr_invoice_no_clean\
          \ = sanitize(raw_ocr_invoice_no)\n\n    if ocr_invoice_no_clean:\n     \
          \   ocr_invoice_flag = \"番号あり\"\n    else:\n        ocr_invoice_flag = \"\
          番号なし\"\n\n    return {\n        \"ocr_amount\":        sanitize(raw_ocr_amount),\n\
          \        \"user_amount\":       sanitize(user_amount),\n        \"ocr_date\"\
          :          sanitize(raw_ocr_date),\n        \"user_date\":         sanitize(user_date),\n\
          \        \"ocr_vendor\":        sanitize(raw_ocr_vendor),\n        \"user_vendor\"\
          :       sanitize(user_vendor),\n        \"ocr_invoice_no\":    ocr_invoice_no_clean,\n\
          \        \"user_invoice_flag\": sanitize(user_invoice_flag),\n        \"\
          ocr_invoice_flag\":  ocr_invoice_flag,\n    }"
        code_language: python3
